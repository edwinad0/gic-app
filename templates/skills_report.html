<div style="padding:40px;font-family:Arial;line-height:1.6;max-width:1100px;margin:auto;color:#222;">

    <div style="display:flex;flex-direction:row;align-items:center;justify-content:space-between;margin-bottom:50px;gap:30px;">

        <!-- LEFT COLUMN: HEADER -->
        <div style="flex:1;padding:10px;">
            <h1 style="margin:0;font-size:32px;color:#003366;">Skills Report</h1>
            <h2 style="margin:8px 0 0 0;font-size:24px;color:#005599;">{person_name}</h2>
            <p style="margin:6px 0 0 0;font-size:16px;"><strong>Current Role:</strong> {role}</p>
            <p style="margin:6px 0 0 0;font-size:14px;color:#555;">{date}</p>
        </div>

        <!-- RIGHT COLUMN: RADAR -->
        <div style="flex:1;padding:10px;text-align:center;">

            <!-- NEW TITLE + SUBTITLE -->
            <h2 style="margin:0 0 6px 0;font-size:22px;color:#003366;">Task Radar</h2>
            <p style="margin:0 0 12px 0;font-size:14px;color:#555;">
                This radar shows the percentage distribution of classified tasks.
            </p>

            <img src="{radar_img}" style="width:360px;border-radius:8px;border:1px solid #ddd;padding:6px;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.08);">
        </div>

    </div>

    <div style="margin-bottom:30px;">
        <div style="padding:10px;border:1px solid #ddd;border-radius:6px;background:#fafafa;margin-bottom:25px;">
            <h2>Current Role & Skills</h2>
            {sg_top10}
            <br>
            {sg_have}
            <br>
            {sg_need}
        </div>

        {career_section}
    </div>


</div>
