<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
</head>

<body style="font-family: Segoe UI, sans-serif; margin: 40px; color: #222;">

<!-- COVER PAGE -->
<div style="text-align: center; margin-top: 150px;">
    <h1 style="color:#0A84FF; margin-bottom: 10px;">Skills Intelligence Report</h1>
    <h2 style="color:#0A84FF; margin-bottom: 5px;">{person_name}</h2>
    <h3 style="color:#0A84FF; margin-bottom: 5px;">{role}</h3>
    <p style="margin-top: 40px; color: #666;">{date}</p>
</div>

<div style="page-break-before: always;"></div>

<!-- SKILL GAP -->
<div style="margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
    <h2 style="color:#0A84FF;">Skill Gap Analysis</h2>

    <div style="background:#fafafa; border:1px solid #e2e2e2; border-radius:8px; padding:16px; margin-bottom:20px;">
        {sg_top10}
    </div>

    <div style="background:#fafafa; border:1px solid #e2e2e2; border-radius:8px; padding:16px; margin-bottom:20px;">
        {sg_have}
    </div>

    <div style="background:#fafafa; border:1px solid #e2e2e2; border-radius:8px; padding:16px; margin-bottom:20px;">
        {sg_need}
    </div>
</div>

<div style="page-break-before: always;"></div>

<!-- RADAR -->
<div style="margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
    <h2 style="color:#0A84FF;">Task Radar</h2>
    <img src="{radar_img}" style="width: 380px;">
</div>

<!-- TASK TABLE -->
<div style="margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #ddd;">
    <h2 style="color:#0A84FF;">Task Classification</h2>
    {task_table}
</div>

<!-- CAREER SECTION -->
{career_section}

</body>
</html>
